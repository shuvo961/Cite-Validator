<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Portal - Cite Validator</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="/logo.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="ambient-page">
      <header class="site-header product-nav">
        <a class="brand" href="/dashboard.html"><img src="/logo.svg" alt="" class="brand-logo"><span>Cite Validator Admin</span></a>
        <nav class="site-nav"><a href="/dashboard.html">Dashboard</a><a href="/validate.html">Validator</a><a href="/converter.html">Converter</a></nav>
        <a class="login-link" href="/">Public site</a>
      </header>
      <main class="content-page">
        <section class="page-hero compact-hero glass-panel">
          <p class="eyebrow">Admin portal</p>
          <h1>Monitor the platform</h1>
          <p>Review users, validation volume, source health, and feedback so Cite Validator can keep improving.</p>
        </section>
        <section id="adminOverview" class="summary-grid admin-summary"></section>
        <section class="admin-grid">
          <article class="glass-panel admin-panel"><h2>Users</h2><div id="adminUsers" class="history-list"></div></article>
          <article class="glass-panel admin-panel"><h2>Source health</h2><div id="adminSources" class="history-list"></div></article>
          <article class="glass-panel admin-panel wide"><h2>Feedback</h2><div id="adminFeedback" class="history-list"></div></article>
        </section>
      </main>
    </div>
    <script src="/admin.js" type="module"></script>
  </body>
</html>
